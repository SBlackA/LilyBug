<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ladybug</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background-color: #b9bbbf; 
  }

  .ladybug {
    position: absolute;
    top: 0;
    left: 0;
    width: 160px;
    height: 100px;
    offset-rotate: auto; /* faces direction of travel */
    animation: travel 14s linear forwards;
  }

  @keyframes travel {
    0%   { offset-distance: 0%; }
    100% { offset-distance: 100%; }
  }

  /* Leg animation - quick alternating scuttle */
  .leg {
    transform-origin: var(--ox) var(--oy);
    animation: scuttle 0.22s ease-in-out infinite;
  }
  .leg.alt {
    animation-delay: 0.11s;
  }

  @keyframes scuttle {
    0%, 100% { transform: rotate(-18deg); }
    50%      { transform: rotate(18deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    .ladybug { animation: none; }
    .leg { animation: none; }
  }
</style>
</head>
<body>

  <div class="ladybug" id="ladybug">
    <!-- Ladybug faces +x (right) by default; offset-rotate handles orientation along the path -->
    <svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">

      <!-- legs -->
      <g stroke="#1C1C1C" stroke-width="7" stroke-linecap="round" fill="none">
        <line class="leg"     style="--ox:75px; --oy:65px"  x1="75"  y1="65" x2="50"  y2="108"/>
        <line class="leg alt" style="--ox:100px; --oy:68px" x1="100" y1="68" x2="92"  y2="124"/>
        <line class="leg"     style="--ox:125px; --oy:65px" x1="125" y1="65" x2="148" y2="108"/>

        <line class="leg alt" style="--ox:75px; --oy:55px"  x1="75"  y1="55" x2="50"  y2="12"/>
        <line class="leg"     style="--ox:100px; --oy:52px" x1="100" y1="52" x2="92"  y2="-4"/>
        <line class="leg alt" style="--ox:125px; --oy:55px" x1="125" y1="55" x2="148" y2="12"/>
      </g>

      <!-- body -->
      <ellipse cx="95" cy="60" rx="62" ry="58" fill="#C0392B"/>

      <!-- head, on the leading (right) edge -->
      <circle cx="165" cy="60" r="28" fill="#1C1C1C"/>

      <!-- antennae -->
      <line x1="178" y1="40" x2="195" y2="22" stroke="#1C1C1C" stroke-width="3" stroke-linecap="round"/>
      <line x1="178" y1="80" x2="195" y2="98" stroke="#1C1C1C" stroke-width="3" stroke-linecap="round"/>
      <circle cx="195" cy="22" r="3.5" fill="#1C1C1C"/>
      <circle cx="195" cy="98" r="3.5" fill="#1C1C1C"/>

      <!-- center seam -->
      <line x1="165" y1="60" x2="35" y2="60" stroke="#1C1C1C" stroke-width="4"/>

      <!-- spots -->
      <circle cx="120" cy="35" r="11" fill="#1C1C1C"/>
      <circle cx="120" cy="85" r="11" fill="#1C1C1C"/>
      <circle cx="78"  cy="30" r="11" fill="#1C1C1C"/>
      <circle cx="78"  cy="90" r="11" fill="#1C1C1C"/>
      <circle cx="50"  cy="60" r="10" fill="#1C1C1C"/>
    </svg>
  </div>

<script>
  // Convert a list of points into one continuous, smooth spline
  // (Catmull-Rom -> cubic Beziers) so there are no sharp corners
  // anywhere along the path.
  function smoothPath(points) {
    let d = `M ${points[0].x},${points[0].y} `;
    for (let i = 0; i < points.length - 1; i++) {
      const p0 = points[i - 1] || points[i];
      const p1 = points[i];
      const p2 = points[i + 1];
      const p3 = points[i + 2] || p2;

      const cp1x = p1.x + (p2.x - p0.x) / 6;
      const cp1y = p1.y + (p2.y - p0.y) / 6;
      const cp2x = p2.x - (p3.x - p1.x) / 6;
      const cp2y = p2.y - (p3.y - p1.y) / 6;

      d += `C ${cp1x},${cp1y} ${cp2x},${cp2y} ${p2.x},${p2.y} `;
    }
    return d.trim();
  }
  
  function buildPath() {
    const w = window.innerWidth;
    const h = window.innerHeight;

    const start = { x: w * 1.19, y: h * 0.8 };   // off-screen, bottom-right
    const nw    = { x: w * 0.25, y: h * 0.18 };
    const turn2 = { x: w * 0.25, y: h * 0.62 };
    const turn3 = { x: w * 1.2,  y: h * 0.3 };
    const turn4 = { x: w * 0.45, y: h * 0.18 };
    const turn5 = { x: w * 0.30, y: h * 0.64 };
    const turn6 = { x: w * 0.45, y: h * 0.10 };
    const exit  = { x: w * 1.15, y: h * 0.45 };  // off-screen, right

    const points = [start, nw, turn2, turn3, turn4, turn2, turn5, turn6, exit];
    const d = smoothPath(points);

    document.getElementById('ladybug').style.offsetPath = `path('${d}')`;
  }

  buildPath();
  window.addEventListener('resize', buildPath);
</script>

</body>
</html>
